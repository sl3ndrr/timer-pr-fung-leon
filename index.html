<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control // Prüfung 01.10.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0a1622;
        --bg-deep: #060d15;
        --grid-line: rgba(120, 176, 224, 0.07);
        --panel: rgba(14, 26, 40, 0.82);
        --panel-border: rgba(120, 176, 224, 0.16);
        --ink: #eaf2fb;
        --muted: #7d93ab;
        --amber: #ffb454;
        --cyan: #6fd6ff;
        --ok: #7ee787;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        min-height: 100vh;
        background: var(--bg-deep);
        color: var(--ink);
        font-family: 'JetBrains Mono', monospace;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
    }

    body {
        background-image:
            linear-gradient(var(--grid-line) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
            radial-gradient(at 15% 10%, rgba(111, 214, 255, 0.09) 0%, transparent 55%),
            radial-gradient(at 85% 90%, rgba(255, 180, 84, 0.06) 0%, transparent 55%);
        background-size: 34px 34px, 34px 34px, cover, cover;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 18px;
        padding-top: max(32px, env(safe-area-inset-top));
        padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    .container { width: 100%; max-width: 760px; }

    /* ---------- Header ---------- */
    .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.72rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 22px;
    }

    .eyebrow .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--amber);
        box-shadow: 0 0 0 0 rgba(255, 180, 84, 0.6);
        animation: radar 1.8s infinite;
    }

    @keyframes radar {
        0%   { box-shadow: 0 0 0 0 rgba(255, 180, 84, 0.55); }
        70%  { box-shadow: 0 0 0 8px rgba(255, 180, 84, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 180, 84, 0); }
    }

    h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: clamp(2rem, 6vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: -0.5px;
        color: var(--ink);
    }

    h1 span { color: var(--cyan); }

    .subtitle {
        margin-top: 10px;
        margin-bottom: 30px;
        color: var(--muted);
        font-size: 0.92rem;
    }

    .subtitle b { color: var(--ink); font-weight: 600; }

    /* ---------- Terminal card ---------- */
    .terminal {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(10px);
        margin-bottom: 26px;
    }

    .terminal-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.02);
        border-bottom: 1px solid var(--panel-border);
    }

    .terminal-bar .btn { width: 10px; height: 10px; border-radius: 50%; }
    .btn.r { background: #ff5f57; }
    .btn.y { background: #febc2e; }
    .btn.g { background: #28c840; }

    .terminal-bar .path {
        margin-left: 10px;
        font-size: 0.75rem;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
        flex: 1;
    }

    .timer-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--panel-border);
    }

    .timer-cell {
        background: var(--bg);
        padding: clamp(18px, 4vw, 34px) 6px;
        text-align: center;
    }

    .digits {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: clamp(2.1rem, 7vw, 3.6rem);
        color: var(--ink);
        text-shadow: 0 0 18px rgba(111, 214, 255, 0.25);
        font-variant-numeric: tabular-nums;
    }

    .unit {
        display: block;
        margin-top: 8px;
        font-size: 0.65rem;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--muted);
    }

    /* ---------- Log / motivation ---------- */
    .log-card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 18px 22px;
        min-height: 92px;
        display: flex;
        align-items: center;
    }

    .log-line {
        font-size: clamp(0.85rem, 2vw, 0.98rem);
        line-height: 1.5;
    }

    .log-tag { font-weight: 700; margin-right: 8px; }
    .tag-ok { color: var(--ok); }
    .tag-warn { color: var(--amber); }
    .tag-info { color: var(--cyan); }

    .cursor {
        display: inline-block;
        width: 8px;
        height: 1.1em;
        background: var(--cyan);
        margin-left: 4px;
        vertical-align: text-bottom;
        animation: blink 1s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .done-banner {
        text-align: center;
        padding: 30px 10px;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.4rem;
        color: var(--amber);
        letter-spacing: 0.5px;
        grid-column: span 4;
    }

    @media (max-width: 560px) {
        body { padding: 20px 12px; align-items: flex-start; padding-top: max(24px, env(safe-area-inset-top)); }
        .timer-grid { grid-template-columns: repeat(2, 1fr); }
        .eyebrow { margin-bottom: 16px; font-size: 0.68rem; letter-spacing: 2px; }
        .subtitle { margin-bottom: 22px; font-size: 0.85rem; }
        .terminal, .log-card { margin-bottom: 18px; }
        .log-card { padding: 16px 16px; min-height: 78px; }
        .terminal-bar .path { font-size: 0.68rem; }
    }

    @media (max-width: 380px) {
        h1 { letter-spacing: -0.3px; }
        .timer-cell { padding: 16px 4px; }
        .digits { font-size: clamp(1.9rem, 9vw, 2.6rem); }
        .unit { letter-spacing: 1.5px; }
        .terminal-bar .path { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
        .eyebrow .dot, .cursor { animation: none; }
    }
</style>
</head>
<body>

<div class="container">

    <div class="eyebrow"><span class="dot"></span> Fokus-Protokoll · aktiv</div>

    <h1>PRÜFUNG <span>01.10.</span><br>ANSTEHEND</h1>
    <p class="subtitle">Countdown bis zum Start: <b>01. Oktober 2026 · 10:30 Uhr</b></p>

    <div class="terminal">
        <div class="terminal-bar">
            <span class="btn r"></span><span class="btn y"></span><span class="btn g"></span>
            <span class="path">~/mission_control.sh — läuft</span>
        </div>
        <div class="timer-grid" id="timerGrid">
            <div class="timer-cell"><div class="digits" id="days">00</div><span class="unit">Tage</span></div>
            <div class="timer-cell"><div class="digits" id="hours">00</div><span class="unit">Stunden</span></div>
            <div class="timer-cell"><div class="digits" id="minutes">00</div><span class="unit">Minuten</span></div>
            <div class="timer-cell"><div class="digits" id="seconds">00</div><span class="unit">Sekunden</span></div>
        </div>
    </div>

    <div class="log-card">
        <div class="log-line" id="logLine">
            <span class="log-tag tag-ok">[BOOT]</span><span id="logText">Fokus-Modus wird geladen...</span><span class="cursor"></span>
        </div>
    </div>

</div>

<script>
    // Zielzeitpunkt der Prüfung
    const targetDate = new Date("2026-10-01T10:30:00").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
            document.getElementById("timerGrid").innerHTML =
                '<div class="done-banner">KLAUSUR LÄUFT. VOLLER FOKUS. ABLIEFERN.</div>';
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        daysEl.textContent = String(days).padStart(2, "0");
        hoursEl.textContent = String(hours).padStart(2, "0");
        minutesEl.textContent = String(minutes).padStart(2, "0");
        secondsEl.textContent = String(seconds).padStart(2, "0");
    }

    const logs = [
        { tag: "OK",    cls: "tag-ok",   text: "Konzentration: 100% zugewiesen." },
        { tag: "INFO",  cls: "tag-info", text: "Fehlertoleranz sinkt mit jedem gelösten Aufgabenblatt." },
        { tag: "WARN",  cls: "tag-warn", text: "Zweifel erkannt — Gegenmaßnahme: nächste Aufgabe lösen." },
        { tag: "OK",    cls: "tag-ok",   text: "Ein Grenzwert existiert immer. Deine Ausrede nicht." },
        { tag: "INFO",  cls: "tag-info", text: "Jede gelöste Aufgabe bringt dich einen Schritt näher." },
        { tag: "OK",    cls: "tag-ok",   text: "Stabilität schlägt Perfektion. Bleib dran." },
        { tag: "INFO",  cls: "tag-info", text: "Ingenieure bauen unter Druck — das hier ist dein Testfeld." },
        { tag: "OK",    cls: "tag-ok",   text: "Du bist näher an der 1.0 als du denkst." },
        { tag: "READY", cls: "tag-warn", text: "Am 01.10. um 10:30 Uhr bist du bereit. Kein 'wenn'." },
        { tag: "INFO",  cls: "tag-info", text: "Pause einlegen zählt auch als Wartung des Systems." }
    ];

    let idx = 0;
    const logLine = document.getElementById("logLine");

    function renderLog() {
        const entry = logs[idx % logs.length];
        logLine.innerHTML =
            '<span class="log-tag ' + entry.cls + '">[' + entry.tag + ']</span>' +
            '<span id="logText">' + entry.text + '</span>' +
            '<span class="cursor"></span>';
        idx++;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    renderLog();
    setInterval(renderLog, 6000);
</script>

</body>
</html>
