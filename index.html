<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission: Mathe 1 bestehen</title>
    <style>
        :root {
            --bg-color: #0b0f17;
            --panel-bg: rgba(20, 27, 41, 0.75);
            --accent-cyan: #00f2fe;
            --accent-blue: #4facfe;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.08) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 2.5rem;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 1; box-shadow: 0 0 10px var(--accent-cyan); }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Typografie */
        h1 {
            font-size: clamp(2.2rem, 5vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 30%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        .highlight {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        /* Grid Timer */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(12px, 2vw, 24px);
            margin-bottom: 3.5rem;
        }

        .timer-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: clamp(15px, 3vw, 30px) 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .timer-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .digits {
            font-size: clamp(2.2rem, 6vw, 5rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(180deg, #ffffff 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 12px rgba(0, 242, 254, 0.2));
            line-height: 1;
        }

        .label {
            display: block;
            font-size: clamp(0.75rem, 1.2vw, 0.95rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 14px;
            font-weight: 600;
        }

        /* Zitat-Box */
        .quote-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 28px 40px;
            position: relative;
            max-width: 750px;
            margin: 0 auto;
        }

        .quote-box::before {
            content: '“';
            position: absolute;
            top: -20px;
            left: 25px;
            font-size: 5rem;
            color: rgba(0, 242, 254, 0.12);
            font-family: Georgia, serif;
            line-height: 1;
        }

        .quote-text {
            font-size: clamp(1rem, 1.5vw, 1.15rem);
            font-style: italic;
            line-height: 1.6;
            color: #e2e8f0;
            min-height: 3.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .timer-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .quote-box {
                padding: 20px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span>Fokus-Protokoll aktiv</span>
        </div>

        <h1>MATHEMATIK 1<br>FÜR INGENIEURE</h1>
        <p class="subtitle">Tag der Abrechnung: <span class="highlight">08. Juli 2026 • 14:00 Uhr</span></p>

        <div class="timer-grid">
            <div class="timer-card">
                <div class="digits" id="days">00</div>
                <span class="label">Tage</span>
            </div>
            <div class="timer-card">
                <div class="digits" id="hours">00</div>
                <span class="label">Stunden</span>
            </div>
            <div class="timer-card">
                <div class="digits" id="minutes">00</div>
                <span class="label">Minuten</span>
            </div>
            <div class="timer-card">
                <div class="digits" id="seconds">00</div>
                <span class="label">Sekunden</span>
            </div>
        </div>

        <div class="quote-box">
            <div class="quote-text" id="quote">Lade Datensatz...</div>
        </div>
    </div>

    <script>
        // Ziel: 8. Juli 2026, 14:00:00 Uhr
        const targetDate = new Date("2026-07-08T14:00:00").getTime();

        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.querySelector(".timer-grid").innerHTML =
                    '<div style="grid-column: span 4; padding: 40px; font-size: 1.8rem; font-weight: 800; color: #00f2fe; letter-spacing: 1px;">KLAUSUR LÄUFT. VÖLLIGER FOKUS.</div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            daysEl.innerText = String(days).padStart(2, '0');
            hoursEl.innerText = String(hours).padStart(2, '0');
            minutesEl.innerText = String(minutes).padStart(2, '0');
            secondsEl.innerText = String(seconds).padStart(2, '0');
        }

        const quotes = [
            "„Schmerz vergeht, der Credit-Point bleibt für die Ewigkeit.“",
            "„Integrieren heißt, das Chaos zu summieren. Bring Ordnung in den Kopf.“",
            "„Du schreibst diese Klausur nicht, um sie zu versuchen. Du schreibst sie, um sie abzuhaken.“",
            "„Grenzwerte existieren in der Analysis – nicht in deiner Willenskraft.“",
            "„Eine 4.0 ist die Krone des effizienten Ingenieurs. Aber hol dir die 1.0!“",
            "„Konzentration ist ein Vektor: Er braucht Betrag und die exakte Richtung.“",
            "„Stell dir das Gefühl am 8. Juli um 16:00 Uhr vor. Arbeite jetzt dafür.“",
            "„Ingenieure weinen nicht, sie definieren das Problem neu. Setz dich wieder dran.“",
            "„Epsilon ist kleiner als du denkst. Und deine Lücke im Stoff ist es auch.“"
        ];

        const quoteEl = document.getElementById("quote");
        let currentQuoteIndex = Math.floor(Math.random() * quotes.length);

        function rotateQuote() {
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                quoteEl.innerText = quotes[currentQuoteIndex];
                quoteEl.style.opacity = 1;
            }, 500);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        quoteEl.innerText = quotes[currentQuoteIndex];
        setInterval(rotateQuote, 8500);
    </script>
</body>
</html>
